<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Lucas Nicéas — Software Engineer</title>
  <desc id="desc">Software engineer focused on payment infrastructure, distributed systems, cloud platforms and artificial intelligence.</desc>
  <defs>
