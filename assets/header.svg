<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.6" stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#161b22"/>
    </pattern>
    <clipPath id="frame">
      <rect x="1" y="1" width="998" height="298" rx="16"/>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace; }
    .role { opacity: 0; animation: cycle 16s linear infinite; }
    .r1 { animation-delay: 0s; }
    .r2 { animation-delay: 4s; }
    .r3 { animation-delay: 8s; }
    .r4 { animation-delay: 12s; }
    @keyframes cycle {
      0%   { opacity: 0; }
      2%   { opacity: 1; }
      23%  { opacity: 1; }
      25%  { opacity: 0; }
      100% { opacity: 0; }
    }
    .cursor { animation: blink 1s steps(1) infinite; }
    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }
  </style>

  <!-- window -->
  <rect x="1" y="1" width="998" height="298" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <g clip-path="url(#frame)">
    <rect x="1" y="49" width="998" height="250" fill="url(#dots)"/>
  </g>

  <!-- title bar -->
  <line x1="1" y1="48" x2="999" y2="48" stroke="#21262d" stroke-width="1.5"/>
  <circle cx="30" cy="25" r="6.5" fill="#ff5f56"/>
  <circle cx="52" cy="25" r="6.5" fill="#ffbd2e"/>
  <circle cx="74" cy="25" r="6.5" fill="#27c93f"/>
  <text x="500" y="30" text-anchor="middle" class="mono" font-size="13" fill="#8b949e">lucas@niceas — ~</text>

  <!-- whoami -->
  <text x="48" y="102" class="mono" font-size="17">
    <tspan fill="#39d353">$</tspan>
    <tspan fill="#8b949e" dx="6">whoami</tspan>
  </text>
  <text x="48" y="156" class="mono" font-size="46" font-weight="700" fill="url(#nameGrad)">Lucas Nicéas</text>

  <!-- role -->
  <text x="48" y="200" class="mono" font-size="17">
    <tspan fill="#39d353">$</tspan>
    <tspan fill="#8b949e" dx="6">role --current</tspan>
  </text>
  <g class="mono" font-size="23">
    <text x="48" y="238" class="role r1" fill="#58a6ff">Software Engineer<tspan class="cursor" fill="#58a6ff">▊</tspan></text>
    <text x="48" y="238" class="role r2" fill="#58a6ff">Payments &amp; Fintech Infrastructure<tspan class="cursor" fill="#58a6ff">▊</tspan></text>
    <text x="48" y="238" class="role r3" fill="#58a6ff">AI Systems &amp; Agents<tspan class="cursor" fill="#58a6ff">▊</tspan></text>
    <text x="48" y="238" class="role r4" fill="#58a6ff">Platform &amp; Cloud Engineering<tspan class="cursor" fill="#58a6ff">▊</tspan></text>
  </g>

  <!-- footer -->
  <circle cx="54" cy="271" r="4.5" fill="#39d353" class="pulse"/>
  <text x="66" y="276" class="mono" font-size="14" fill="#8b949e">open to high-impact work</text>
  <text x="952" y="276" text-anchor="end" class="mono" font-size="14" fill="#6e7681">Portugal · UTC±0 · remote</text>
</svg>
